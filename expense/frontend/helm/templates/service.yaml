apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: expense
  labels:  
    name: frontend
    tier: web
    project: expense
spec:
  type: LoadBalancer
  selector:
      name: frontend
      tier: web
      project: expense
  ports:
    - name: frontend-ports
      protocol: TCP
      port: 80
      targetPort: 8080